<div class="expense-list">
    <div class="content-header">
        <h1 class="title">Доходы и расходы</h1>
    </div>

    <section class="content">
        <div class="container-fluid">
            <div class="tab d-flex align-items-center justify-content-between flex-wrap">
                <div class="btn-group" role="group" aria-label="Фильтр периода">
                    <div class="d-flex  filter-group">
                        <button type="button" class="btn btn-primary filter-button">Сегодня</button>
                        <button type="button" class="btn btn-outline-secondary filter-button">Неделя</button>
                        <button type="button" class="btn btn-outline-secondary filter-button">Месяц</button>
                        <button type="button" class="btn btn-outline-secondary filter-button">Год</button>
                        <button type="button" class="btn btn-outline-secondary filter-button">Все</button>
                        <button type="button" class="btn btn-outline-secondary mr-3">Интервал</button>
                    </div>
                    <div class="d-flex align-items-center ml-4">
                        <span class="text-muted mr-2">с</span>
                        <span class="date-link mr-2">Дата</span>

                        <span class="text-muted mr-2">по</span>
                        <span class="date-link">Дата</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 p-4">
                    <h3 class="card-title mb-3 text-center" style="color: #E34A61;">Доходы</h3>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="incomeChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 p-4">
                    <h3 class="card-title mb-3 text-center" style="color: #6A3297;">Расходы</h3>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </section>
</div>

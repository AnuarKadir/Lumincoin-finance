<div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-box" style="width: 100%; max-width: 400px;">
        <div class="login-logo text-center mb-5">
            <img src="/images/Logo.png" alt="Lumincoin Logo"/>
        </div>

                <h5 class="text-center mb-3">Войти</h5>
                <div id="common-error" class="error invalid-feedback text-center mb-3">Не правильный email или пароль
                </div>
                <form>
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="fa-solid fa-envelope-open"></i></span>
                        <input type="email" class="form-control rounded-end" placeholder="Email" id="email">
                        <span id="email-error" class="error invalid-feedback">Введите корректный E-mail</span>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="far fa-lock"></i></span>
                        <input type="password" class="form-control  rounded-end" placeholder="Пароль" id="password">
                        <span id="password-error" class="error invalid-feedback">Заполните пароль</span>
                    </div>
                    <div class="row mb-3">
                        <div class="col-12">
                            <div>
                                <input type="checkbox" id="remember-me">
                                <label for="remember-me">
                                    Запомнить меня
                                </label>
                            </div>
                        </div>
                        <!-- /.col -->
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <button type="button" class="btn btn-primary btn-block w-100 mt-2" id="process-button">Войти</button>
                        </div>
                    </div>
                    <p class="text-center mt-1 mb-0">Еще нету аккаунта?  <a href="/signup">
                        Войдите в систему
                    </a></p>
                </form>
    </div>
</div>

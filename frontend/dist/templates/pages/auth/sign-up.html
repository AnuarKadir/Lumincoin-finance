<div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-box" style="width: 100%; max-width: 400px;">
        <div class="login-logo text-center mb-5">
            <img src="/images/Logo.png" alt="Lumincoin Logo"/>
        </div>

        <h5 class="text-center mb-3">Создайте аккаунт</h5>
        <div id="common-error" class="error invalid-feedback text-center mb-3">Не удалось зарегистрировать пользователя.
            Обратитесь в поддержку
        </div>
        <form>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                <input type="text" class="form-control rounded-end" placeholder="Имя" id="name">
                <span id="name-error" class="error invalid-feedback">Введите корректное имя</span>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person text-muted"></i></i></span>
                <input type="text" class="form-control rounded-end" placeholder="Фамилия" id="last-name">
                <span id="surname-error" class="error invalid-feedback">Введите корректную фамилию</span>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-light fa-envelope-open"></i></i></span>
                <input type="email" class="form-control rounded-end" placeholder="Email" id="email">
                <span id="email-error" class="error invalid-feedback">Введите корректный E-mail</span>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-light fa-lock"></i></span>
                <input type="password" class="form-control  rounded-end" placeholder="Заполните пароль" id="password">
                <span id="password-error" class="error invalid-feedback">Пароль</span>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-light fa-lock"></i></span>
                <input type="password" class="form-control  rounded-end" placeholder="Подтверждение пароля"
                       id="password-repeat">
                <span id="password-repeat-error" class="error invalid-feedback">Пароль и повторение пароля</span>
            </div>

            <div class="row">
                <div class="col-12">
                    <button type="button" class="btn btn-primary btn-block w-100 mt-2" id="process-button">
                        Зарегистрироваться
                    </button>
                </div>
            </div>
            <p class="text-center mt-1 mb-0"> Уже есть аккаунт?<a href="/login">
                Войдите в систему
            </a></p>
        </form>
        <!-- /.social-auth-links -->
    </div>


</div>
